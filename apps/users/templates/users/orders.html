{% extends "base.html" %}
{% load static %}

{% block title %}My Orders - Live Bakery{% endblock %}

{% block content %}
{% if not user.is_customer %}
<div class="max-w-6xl mx-auto my-8 px-4">
    <div class="text-center py-12">
        <div class="w-24 h-24 mx-auto mb-4 bg-gray-100 rounded-full flex items-center justify-center">
            <span class="text-3xl">🚫</span>
        </div>
        <h3 class="text-xl font-semibold text-gray-700 mb-2">Access Denied</h3>
        <p class="text-gray-600 mb-6">This page is for customers only.</p>
        <a href="{% url 'core:home' %}" 
           class="bg-[#8f3232] text-white px-6 py-3 rounded-lg font-medium hover:bg-[#7a2a2a] inline-block">
            Go Home
        </a>
    </div>
</div>
{% else %}
<!-- Existing orders content here -->
<div class="max-w-6xl mx-auto my-8 px-4">
    <!-- ... rest of existing orders.html content ... -->
</div>
{% endif %}
{% endblock %}
